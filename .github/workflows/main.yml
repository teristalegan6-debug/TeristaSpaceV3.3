name: Android CI/CD

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '21'
  ANDROID_API_LEVEL: 35
  ANDROID_BUILD_TOOLS_VERSION: 35.0.0
  ANDROID_NDK_VERSION: 27.1.12297006

jobs:
  code-quality:
    name: Code Quality & Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Run Android Lint
      run: ./gradlew lintDebug --continue
    - name: Upload Lint Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-reports
        path: '*/build/reports/lint-results-*.html'

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest --continue
    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-reports
        path: '*/build/reports/tests/'

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: gradle
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Install Build Tools
      run: |
        sdkmanager "build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}"
        sdkmanager "platforms;android-${{ env.ANDROID_API_LEVEL }}"
        sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: gradle
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Install Build Tools
      run: |
        sdkmanager "build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}"
        sdkmanager "platforms;android-${{ env.ANDROID_API_LEVEL }}"
        sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
        
